<!DOCTYPE html>
<html lang="{{ lang_attr }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ t('site_title') }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="wrap">
            <div class="site-header-row">
                <div>
                    <a class="brand" href="/">{{ t('site_title') }}</a>
                    <p class="tagline">{{ t('tagline') }}</p>
                </div>
                <div class="language-switcher" aria-label="{{ t('language_label') }}">
                    {% for code, label in languages.items() %}
                    <a href="{{ language_switch_urls[code] }}" class="language-link {% if lang == code %}language-link-active{% endif %}">{{ label }}</a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </header>
    <main class="wrap">
        <nav class="function-bar">
            <a href="/import" class="function-link {% if nav_current == 'import' %}function-link-active{% endif %}">{{ t('nav_import') }}</a>
            <a href="/browse" class="function-link {% if nav_current == 'browse' %}function-link-active{% endif %}">{{ t('nav_browse') }}</a>
            <a href="/search" class="function-link {% if nav_current == 'search' %}function-link-active{% endif %}">{{ t('nav_search') }}</a>
        </nav>
        {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
